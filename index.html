
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wishlist Trum 💗 An</title>

<style>

body{
margin:0;
font-family:sans-serif;

background-image:url("background.jpg");
background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
gap:40px;

flex-wrap:wrap;
}

/* BOX */

.box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);

padding:30px;
border-radius:30px;

width:340px;
max-width:90vw;

border:1px solid rgba(255,255,255,0.4);

box-shadow:
0 20px 60px rgba(0,0,0,0.5),
0 0 25px rgba(255,150,200,0.3);
}

/* TITLE */

h2{
text-align:center;
margin-bottom:20px;
font-size:26px;
color:white;
}

/* INPUT */

input{
width:100%;
padding:14px;
margin-bottom:12px;

border:none;
border-radius:18px;

background:rgba(255,255,255,0.3);

color:white;

box-sizing:border-box;
}

/* BUTTON */

button{
width:100%;
padding:14px;

border:none;
border-radius:20px;

background:linear-gradient(45deg,#ff6fa5,#ff3f80);

color:white;

font-weight:bold;
font-size:15px;

cursor:pointer;
}

/* LIST */

ul{
list-style:none;
padding:0;
margin-top:15px;
display:none;
}

/* ITEM */

li{
background:rgba(255,255,255,0.25);
padding:12px;
margin-top:10px;

border-radius:15px;

border:1px solid rgba(255,255,255,0.5);

color:white;
}

/* DELETE */

.delete{
margin-top:8px;
background:#ff5252;
padding:8px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
width:100%;
}

/* MOBILE */

@media (max-width:700px){

body{
flex-direction:column;
padding:20px;
}

}

</style>
</head>

<body>

<!-- TRUM -->

<div class="box">

<h2>Trum</h2>

<input id="gift1" placeholder="🎁 Quà">
<input id="price1" placeholder="💰 Giá">
<input id="link1" placeholder="🔗 Link">

<button onclick="addGift(1)">Thêm</button>

<ul id="list1"></ul>

</div>


<!-- AN -->

<div class="box">

<h2>An</h2>

<input id="gift2" placeholder="🎁 Quà">
<input id="price2" placeholder="💰 Giá">
<input id="link2" placeholder="🔗 Link">

<button onclick="addGift(2)">Thêm</button>

<ul id="list2"></ul>

</div>


<script>

let data={
1:[],
2:[]
}

/* LOAD DATA */

if(localStorage.getItem("wishlist")){
data=JSON.parse(localStorage.getItem("wishlist"))
}

render()

/* ADD */

function addGift(n){

const gift=document.getElementById("gift"+n).value
const price=document.getElementById("price"+n).value
const link=document.getElementById("link"+n).value

if(!gift) return

data[n].push({gift,price,link})

save()

render()

document.getElementById("gift"+n).value=""
document.getElementById("price"+n).value=""
document.getElementById("link"+n).value=""

}

/* DELETE */

function deleteGift(n,i){

function toggleBought(n,i){

data[n][i].bought = !data[n][i].bought

save()

render()

}

data[n].splice(i,1)

save()

render()

}

/* SAVE */

function save(){

localStorage.setItem("wishlist",JSON.stringify(data))

}

/* RENDER */

function render(){

for(let n of [1,2]){

const list=document.getElementById("list"+n)

list.innerHTML=""

if(data[n].length==0){

list.style.display="none"
continue

}

list.style.display="block"

data[n].forEach((item,i)=>{

const li=document.createElement("li")

if(item.bought){
li.style.opacity="0.5"
li.style.textDecoration="line-through"
}

li.innerHTML=
"<b>🎁 "+item.gift+"</b>"+
"<br>💰 "+item.price+
"<br><a href='"+item.link+"' target='_blank'>🔗 Link</a>"+
"<button onclick='toggleBought("+n+","+i+")'>Đã mua</button>"+
"<button class='delete' onclick='deleteGift("+n+","+i+")'>Xóa</button>"

list.appendChild(li)

})

}

}

</script>

</body>
</html>
