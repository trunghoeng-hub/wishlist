<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title> Bụt hiện lên và nói </title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

margin:0;
min-height:100vh;

display:flex;
justify-content:center;
align-items:flex-start;
padding-top:80px;

color:white;
}

.container{
display:flex;
gap:50px;
align-items:flex-start;
}

/* KHUNG TRUM AN */
.box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);

padding:30px;

border-radius:28px;

width:330px;
max-width:90vw;

border:1px solid rgba(255,255,255,0.25);

box-shadow:
0 20px 60px rgba(0,0,0,0.6),
0 0 25px rgba(255,150,200,0.25),
inset 0 0 20px rgba(255,255,255,0.15);

transition:0.35s;
}

.box:hover{
transform:translateY(-6px) scale(1.02);

box-shadow:
0 30px 80px rgba(0,0,0,0.8),
0 0 40px rgba(255,150,200,0.5),
inset 0 0 25px rgba(255,255,255,0.2);
}

/* Ô nhập */
input{
width:100%;
margin-bottom:12px;

padding:12px;

border:none;

border-radius:14px;

background:rgba(255,255,255,0.15);

color:white;

font-size:14px;

outline:none;

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.25);

box-sizing:border-box;
}

button{
width:100%;
padding:12px;

border:none;

background:linear-gradient(
45deg,
#ff7fa6,
#ff4f87
);

color:white;

border-radius:14px;

font-size:15px;
font-weight:600;

cursor:pointer;

transition:0.3s;

box-shadow:
0 0 10px rgba(255,100,150,0.6),
0 0 20px rgba(255,100,150,0.4);

box-sizing:border-box;
}

/* item */
.item{
background:rgba(255,255,255,0.2);
padding:10px;
margin-top:10px;
border-radius:12px;
}

/* nút xoá */
.delete{
background:#ff5c5c;
margin-top:6px;
border-radius:8px;
}

.header{
position:absolute;
top:20px;
font-size:28px;
font-weight:600;
text-align:center;
width:100%;
color:white;
text-shadow:0 5px 20px rgba(0,0,0,0.6);
}

/* HEART ANIMATION */

.heart{
position:fixed;
top:-10px;
color:pink;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

li{
background:rgba(255,255,255,0.12);

padding:12px;

margin-top:10px;

border-radius:14px;

border:1px solid rgba(255,255,255,0.2);

box-shadow:0 10px 25px rgba(0,0,0,0.4);

font-size:14px;

transition:0.25s;
}

li:hover{
transform:translateY(-3px);
}

@media (max-width:700px){

body{
flex-direction:column;
align-items:center;
padding:20px;
}

.box{
width:90%;
max-width:400px;
}

}


  
</style>

</head>
<body>
<div class="header">
💗 Wishlist của Trum & An 💗
</div>

<div class="container">

<div class="box">
<h2>Danh sách Trum</h2>

<input id="giftT" placeholder="🎁 Quà">
<input id="priceT" placeholder="💰 Giá">
<input id="linkT" placeholder="🔗 Link">

<button onclick="addItem('trum')">Thêm</button>

<div id="list-trum"></div>
</div>


<div class="box">
<h2>Danh sách An</h2>

<input id="giftA" placeholder="🎁 Quà">
<input id="priceA" placeholder="💰 Giá">
<input id="linkA" placeholder="🔗 Link">

<button onclick="addItem('an')">Thêm</button>

<div id="list-an"></div>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnbgpwDsW8wopFOZ0PIt6Qy5EoirJU570",
  authDomain: "wishlist-4ccb0.firebaseapp.com",
  projectId: "wishlist-4ccb0",
  storageBucket: "wishlist-4ccb0.firebasestorage.app",
  messagingSenderId: "438711329642",
  appId: "1:438711329642:web:6091a8971a1f78199fbb13",
  measurementId: "G-QQGWJH4YL7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.addItem = async function(user){

let gift,price,link

if(user==="trum"){
gift=document.getElementById("giftT").value
price=document.getElementById("priceT").value
link=document.getElementById("linkT").value
}else{
gift=document.getElementById("giftA").value
price=document.getElementById("priceA").value
link=document.getElementById("linkA").value
}

await addDoc(collection(db,user),{
gift:gift,
price:price,
link:link
})

}

function loadList(user){

const list=document.getElementById("list-"+user)

onSnapshot(collection(db,user),(snapshot)=>{

list.innerHTML=""

snapshot.forEach(docItem=>{

const data=docItem.data()

const div=document.createElement("div")
div.className="item"

div.innerHTML = `
<b>${data.gift}</b><br>
💰 ${data.price}<br>
<a href="${data.link}" target="_blank">Link</a><br>
<button class="delete" data-id="${id}">Xóa</button>
`

div.querySelector("button").onclick=async()=>{
div.querySelector(".buy").onclick=()=>{
div.classList.toggle("bought")
}
await deleteDoc(doc(db,user,docItem.id))
}

list.appendChild(div)

})

})

}

loadList("trum")
loadList("an")

</script>

<script>
const db = firebase.database();

const trum = document.getElementById("trum");
const an = document.getElementById("an");

db.ref("wishlist").on("value", snapshot => {

trum.innerHTML = "";
an.innerHTML = "";

snapshot.forEach(child => {

const data = child.val();
const id = child.key;

const div = document.createElement("div");
div.className = "item";

div.innerHTML = `
<b>${data.gift}</b><br>
💰 ${data.price}<br>
<a href="${data.link}" target="_blank">Link</a><br>
<button class="delete">🗑 Xóa</button>
`;

div.querySelector(".delete").addEventListener("click", function(){

if(confirm("Bạn muốn xóa món này?")){
firebase.database().ref("wishlist/" + id).remove();
}

});

if(data.person === "trum"){
trum.appendChild(div);
}else{
an.appendChild(div);
}

});

});
</script>
  
</body>
</html>
