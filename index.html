<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bụt hiện lên và nói</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

margin:0;
min-height:100vh;

display:flex;
justify-content:center;
align-items:flex-start;
padding-top:80px;

color:white;
}

.container{
display:flex;
gap:50px;
}

/* KHUNG TRUM AN */
.box{
background:linear-gradient(
135deg,
rgba(255,182,193,0.25),
rgba(255,255,255,0.15)
);

backdrop-filter:blur(15px);

padding:28px;
border-radius:25px;

width:320px;

border:1px solid rgba(255,255,255,0.35);

box-shadow:
0 20px 50px rgba(0,0,0,0.5),
inset 0 0 20px rgba(255,255,255,0.2);

transition:0.3s;
}

.box:hover{
transform:translateY(-6px) scale(1.02);
}

h2{
text-align:center;
font-weight:600;
margin-bottom:15px;
}

/* Ô nhập */
input{
width:100%;
margin-bottom:12px;
padding:11px;

border:none;
border-radius:12px;

background:#ececec;
color:black;
}

/* Nút thêm */
button{
padding:11px;

border:none;

background:linear-gradient(
45deg,
#ff8fb1,
#ff4f87
);

color:white;

border-radius:12px;

cursor:pointer;

width:100%;

font-weight:600;

transition:0.25s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 6px 20px rgba(255,100,150,0.6);
}

/* item */
.item{
background:rgba(255,255,255,0.2);
padding:10px;
margin-top:10px;
border-radius:12px;
}

/* nút xoá */
.delete{
background:#ff5c5c;
margin-top:6px;
border-radius:8px;
}
.header{
position:absolute;
top:20px;
font-size:28px;
font-weight:600;
text-align:center;
width:100%;
color:white;
text-shadow:0 5px 20px rgba(0,0,0,0.6);
}

.heart{
position:fixed;
top:-10px;
color:pink;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>

</head>
<body>

 <div class="header">
💗 Wishlist của Trum & An 💗
</div> 

<div class="container">

<div class="box">
<h2> Trum</h2>

<input id="giftT" placeholder="🎁 Quà">
<input id="priceT" placeholder="💰 Giá">
<input id="linkT" placeholder="🔗 Link">

<button onclick="addItem('trum')">Thêm</button>

<div id="list-trum"></div>
</div>


<div class="box">
<h2> An</h2>

<input id="giftA" placeholder="🎁 Quà">
<input id="priceA" placeholder="💰 Giá">
<input id="linkA" placeholder="🔗 Link">

<button onclick="addItem('an')">Thêm</button>

<div id="list-an"></div>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnbgpwDsW8wopFOZ0PIt6Qy5EoirJU570",
  authDomain: "wishlist-4ccb0.firebaseapp.com",
  projectId: "wishlist-4ccb0",
  storageBucket: "wishlist-4ccb0.firebasestorage.app",
  messagingSenderId: "438711329642",
  appId: "1:438711329642:web:6091a8971a1f78199fbb13",
  measurementId: "G-QQGWJH4YL7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.addItem = async function(user){

let gift,price,link

if(user==="trum"){
gift=document.getElementById("giftT").value
price=document.getElementById("priceT").value
link=document.getElementById("linkT").value
}else{
gift=document.getElementById("giftA").value
price=document.getElementById("priceA").value
link=document.getElementById("linkA").value
}

await addDoc(collection(db,user),{
gift:gift,
price:price,
link:link
})

}

function loadList(user){

const list=document.getElementById("list-"+user)

onSnapshot(collection(db,user),(snapshot)=>{

list.innerHTML=""

snapshot.forEach(docItem=>{

const data=docItem.data()

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
<b>${data.gift}</b><br>
💰 ${data.price}<br>
<a href="${data.link}" target="_blank">Link</a><br>
<button class="delete">Xóa</button>
`

div.querySelector("button").onclick=async()=>{
await deleteDoc(doc(db,user,docItem.id))
}

list.appendChild(div)

})

})

}

loadList("trum")
loadList("an")

</script>

</body>

</html>
