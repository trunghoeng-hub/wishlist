<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trum 💗 An Wishlist</title>

<link rel="icon" href="icon.png">

<style>

body{
margin:0;
font-family:sans-serif;

background-image:url("background.jpg");
background-size:cover;
background-position:center;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
gap:40px;
flex-wrap:wrap;
}

/* card */

.box{

background:rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

border-radius:20px;

padding:25px;

width:320px;

color:white;

box-shadow:0 0 20px rgba(255,100,200,0.3);

}

/* title */

h2{
text-align:center;
margin-top:0;
}

/* input */

input{

width:100%;
padding:10px;
margin:5px 0;

border-radius:10px;

border:none;

outline:none;

}

/* button */

button{

width:100%;

padding:10px;

border:none;

border-radius:10px;

background:#ff6ec7;

color:white;

font-weight:bold;

cursor:pointer;

margin-top:5px;

transition:0.3s;

}

button:hover{

box-shadow:0 0 10px #ff6ec7;

transform:scale(1.05);

}

/* list */

ul{

list-style:none;

padding:0;

}

/* item card */

li{

background:rgba(255,255,255,0.2);

margin:10px 0;

padding:12px;

border-radius:12px;

box-shadow:0 0 10px rgba(255,255,255,0.2);

}

/* link */

a{
color:#fff;
}

/* delete button */

.delete{

background:#ff4d6d;

margin-top:5px;

}

/* bought */

.bought{

opacity:0.5;

text-decoration:line-through;

}

/* mobile */

@media(max-width:700px){

body{

flex-direction:column;

padding:20px;

}

}

</style>

</head>

<body>

<div class="box">

<h2>Trum 💗</h2>

<input id="gift0" placeholder="Tên quà">

<input id="price0" placeholder="Giá">

<input id="link0" placeholder="Link">

<button onclick="addGift(0)">Thêm</button>

<ul id="list0"></ul>

</div>

<div class="box">

<h2>An 🌸</h2>

<input id="gift1" placeholder="Tên quà">

<input id="price1" placeholder="Giá">

<input id="link1" placeholder="Link">

<button onclick="addGift(1)">Thêm</button>

<ul id="list1"></ul>

</div>

<script>

/* load data */

let data=JSON.parse(localStorage.getItem("wishlist")) || [[],[]]

/* save */

function save(){

localStorage.setItem("wishlist",JSON.stringify(data))

}

/* render */

function render(){

[0,1].forEach(n=>{

let ul=document.getElementById("list"+n)

ul.innerHTML=""

data[n].forEach((item,i)=>{

let li=document.createElement("li")

if(item.bought){

li.classList.add("bought")

}

li.innerHTML=

"<b>🎁 "+item.gift+"</b>"+

"<br>💰 "+item.price+

"<br><a href='"+item.link+"' target='_blank'>🔗 Link</a>"+

"<br><button onclick='toggleBought("+n+","+i+")'>Đã mua</button>"+

"<button class='delete' onclick='deleteGift("+n+","+i+")'>Xóa</button>"

ul.appendChild(li)

})

})

}

/* add */

function addGift(n){

let gift=document.getElementById("gift"+n).value

let price=document.getElementById("price"+n).value

let link=document.getElementById("link"+n).value

if(!gift)return

data[n].push({

gift,

price,

link,

bought:false

})

save()

render()

}

/* delete */

function deleteGift(n,i){

data[n].splice(i,1)

save()

render()

}

/* bought */

function toggleBought(n,i){

data[n][i].bought=!data[n][i].bought

save()

render()

}

render()

</script>

</body>
</html>
