```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wishlist Trum 💗 An</title>

<style>

body{
margin:0;
font-family:sans-serif;

background:linear-gradient(135deg,#7b1c1c,#b33a3a);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
gap:40px;

flex-wrap:wrap;
}

/* BOX */

.box{

background:rgba(255,255,255,0.1);

backdrop-filter:blur(20px);

padding:30px;

border-radius:30px;

width:340px;
max-width:90vw;

border:1px solid rgba(255,255,255,0.4);

box-shadow:
0 20px 60px rgba(0,0,0,0.5),
0 0 25px rgba(255,150,200,0.3);

transition:0.3s;

}

.box:hover{
transform:translateY(-5px);
}

/* TITLE */

h2{
text-align:center;
margin-bottom:20px;
font-size:28px;
color:white;
}

/* INPUT */

input{

width:100%;

padding:14px;

margin-bottom:12px;

border:none;

border-radius:18px;

background:rgba(255,255,255,0.3);

color:white;

font-size:14px;

box-sizing:border-box;

}

/* BUTTON */

button{

width:100%;

padding:14px;

border:none;

border-radius:20px;

background:linear-gradient(45deg,#ff6fa5,#ff3f80);

color:white;

font-weight:bold;

font-size:16px;

cursor:pointer;

transition:0.3s;

box-shadow:
0 0 10px rgba(255,100,150,0.6),
0 0 20px rgba(255,100,150,0.4);

}

button:hover{

transform:scale(1.05);

box-shadow:
0 0 20px rgba(255,100,150,0.9),
0 0 40px rgba(255,100,150,0.7);

}

/* LIST */

ul{
list-style:none;
padding:0;
margin-top:15px;
display:none;
}

/* ITEM CARD */

li{

background:rgba(255,255,255,0.25);

padding:12px;

margin-top:10px;

border-radius:15px;

border:1px solid rgba(255,255,255,0.5);

box-shadow:0 10px 20px rgba(0,0,0,0.2);

font-size:14px;

}

/* DELETE */

.delete{

margin-top:10px;

background:#ff5252;

padding:8px;

border-radius:10px;

border:none;

color:white;

cursor:pointer;

width:100%;

}

/* HEART */

.heart{

position:fixed;

top:-10px;

font-size:20px;

animation:fall 6s linear forwards;

}

@keyframes fall{

to{
transform:translateY(110vh);
opacity:0;
}

}

/* MOBILE */

@media (max-width:700px){

body{

flex-direction:column;

padding:20px;

}

}

</style>
</head>

<body>

<!-- TRUM -->

<div class="box">

<h2>Trum</h2>

<input id="gift1" placeholder="🎁 Quà">
<input id="price1" placeholder="💰 Giá">
<input id="link1" placeholder="🔗 Link">

<button onclick="addGift(1)">Thêm</button>

<ul id="list1"></ul>

</div>


<!-- AN -->

<div class="box">

<h2>An</h2>

<input id="gift2" placeholder="🎁 Quà">
<input id="price2" placeholder="💰 Giá">
<input id="link2" placeholder="🔗 Link">

<button onclick="addGift(2)">Thêm</button>

<ul id="list2"></ul>

</div>


<script>

function addGift(n){

const gift=document.getElementById("gift"+n).value
const price=document.getElementById("price"+n).value
const link=document.getElementById("link"+n).value

if(!gift) return

const li=document.createElement("li")

li.innerHTML=

"🎁 "+gift+

"<br>💰 "+price+

"<br><a href='"+link+"' target='_blank'>🔗 Link</a>"+

"<button class='delete'>Xóa</button>"

const list=document.getElementById("list"+n)

list.appendChild(li)

list.style.display="block"

/* delete */

li.querySelector(".delete").onclick=function(){

li.remove()

if(list.children.length==0){
list.style.display="none"
}

}

document.getElementById("gift"+n).value=""
document.getElementById("price"+n).value=""
document.getElementById("link"+n).value=""

}

/* HEART */

function createHeart(){

const heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="💗"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(createHeart,500)

</script>

</body>
</html>
